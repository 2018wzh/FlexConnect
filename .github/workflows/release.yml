name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  GO_VERSION: "1.26.2"

jobs:
  build-linux:
    name: Build Linux Packages
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Derive release version
        id: version
        shell: bash
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build Linux artifacts
        shell: bash
        run: |
          go run ./cmd/dist build \
            --version "${{ steps.version.outputs.value }}" \
            --verbose \
            --manifest linux-manifest.txt \
            linux/amd64/tgz \
            linux/amd64/deb \
            linux/amd64/rpm

      - name: Read Linux manifest
        id: manifest
        shell: bash
        run: |
          {
            echo "paths<<EOF"
            cat linux-manifest.txt
            echo
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-release-assets
          if-no-files-found: error
          path: ${{ steps.manifest.outputs.paths }}

  build-windows:
    name: Build Windows Packages
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install WiX CLI
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 6.0.2
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Derive release version
        id: version
        shell: bash
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build Windows artifacts
        shell: bash
        run: |
          go run ./cmd/dist build \
            --version "${{ steps.version.outputs.value }}" \
            --verbose \
            --manifest windows-manifest.txt \
            windows/amd64/zip \
            windows/amd64/msi

      - name: Read Windows manifest
        id: manifest
        shell: bash
        run: |
          {
            echo "paths<<EOF"
            cat windows-manifest.txt
            echo
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-assets
          if-no-files-found: error
          path: ${{ steps.manifest.outputs.paths }}

  build-macos:
    name: Build macOS Packages (${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            runner: macos-15-intel
          - goarch: arm64
            runner: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Derive release version
        id: version
        shell: bash
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build macOS artifacts
        shell: bash
        run: |
          go run ./cmd/dist build \
            --version "${{ steps.version.outputs.value }}" \
            --verbose \
            --manifest macos-manifest-${{ matrix.goarch }}.txt \
            darwin/${{ matrix.goarch }}/pkg

      - name: Read macOS manifest
        id: manifest
        shell: bash
        run: |
          {
            echo "paths<<EOF"
            cat macos-manifest-${{ matrix.goarch }}.txt
            echo
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release-assets-${{ matrix.goarch }}
          if-no-files-found: error
          path: ${{ steps.manifest.outputs.paths }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-windows
      - build-macos

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**
          generate_release_notes: true
          fail_on_unmatched_files: true
